# ============================================
# Nginx 反向代理配置
# ============================================
# 使用方法:
#   1. 将此文件复制到 /etc/nginx/conf.d/ 或 /etc/nginx/sites-available/
#   2. 修改 server_name 为你的域名
#   3. 重启 nginx: systemctl restart nginx
# ============================================

# HTTP -> HTTPS 重定向（可选）
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # 启用HTTPS时取消注释
    
    server_name your-domain.com;  # 替换为你的域名
    
    # SSL 配置（可选）
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    
    # 日志配置
    access_log /var/log/nginx/ai-writing-access.log;
    error_log /var/log/nginx/ai-writing-error.log;
    
    # 请求大小限制（支持大文件上传）
    client_max_body_size 50M;
    
    # 代理到 FastAPI 应用
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（SSE 流式输出需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置（AI处理可能需要较长时间）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # 静态资源缓存
    location /assets/ {
        proxy_pass http://127.0.0.1:8000/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
